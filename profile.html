<!DOCTYPE html>
<html>
<head>

<title>AI Boss Profile</title>

<style>

body{
background:#0b0b0b;
color:white;
font-family:Arial;
text-align:center;
}

.card{
background:#1a1a1a;
width:85%;
max-width:400px;
margin:40px auto;
padding:20px;
border-radius:15px;
}

img{
width:100px;
height:100px;
border-radius:50%;
}

input{
width:90%;
padding:10px;
margin:10px;
border-radius:8px;
}

button{
width:90%;
padding:12px;
margin:10px;
border:none;
border-radius:10px;
background:#007bff;
color:white;
font-weight:bold;
}

</style>

</head>

<body>


<div class="card">

<h2>👤 AI Boss Profile</h2>


<img id="profileImg" src="https://via.placeholder.com/100">


<input id="name" placeholder="Your Name">

<input id="email" placeholder="Email">


<button onclick="saveProfile()">
💾 Save Profile
</button>


<button onclick="logout()">
🚪 Logout
</button>


<a href="settings.html">
⬅️ Back Settings
</a>


</div>



<script>


function saveProfile(){

let name =
document.getElementById("name").value;

let email =
document.getElementById("email").value;


localStorage.setItem("AI_Name",name);

localStorage.setItem("AI_Email",email);


alert("Profile Saved ✅");

}



function loadProfile(){

document.getElementById("name").value =
localStorage.getItem("AI_Name") || "";

document.getElementById("email").value =
localStorage.getItem("AI_Email") || "";

}


function logout(){

localStorage.clear();

window.location.href="login.html";

}


window.onload=loadProfile;


</script>


</body>
</html>
