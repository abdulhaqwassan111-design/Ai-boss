<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;

background:#f5f5f5;

header{

color:white;
padding:20px;

padding:20px;

background:white;
margin:20px auto;

padding:20px;

}
button{
background:#007bff;

border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;

}
footer{
background:#222;
color:white;
padding:15px;

<body>

<header>

</header>

<div class="container">

<div class="card">
<h2>AI Chat</h2>
<p>Ask anything with AI.</p>
<button onclick="openTool('AI Chat')">Open</button>
</div>

<div class="card">
<h2>AI Image Generator</h2>
<p>Create amazing AI images.</p>
<button onclick="openTool('AI Image Generator')">Open</button>
</div>

<div class="card">
<h2>Voice Over</h2>
<p>Create AI voices instantly.</p>
<button onclick="openTool('Voice Over')">Open</button>
</div>

<div class="card">
<h2>PDF Tools</h2>

<footer>
© 2026 AI Boss
</footer>

<script>
function openTool(name){
alert(name + " is coming soon!");
}

</html>
