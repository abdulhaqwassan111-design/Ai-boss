<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Boss Chat</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#202123;
color:#fff;
height:100vh;
overflow:hidden;
}

.app{
display:flex;
height:100vh;
}

.sidebar{
width:260px;
background:#171717;
padding:20px;
display:flex;
flex-direction:column;
}

.logo{
font-size:28px;
font-weight:bold;
color:#19c2ff;
margin-bottom:20px;
}

.new-chat{
width:100%;
padding:14px;
background:#19c2ff;
color:#000;
border:none;
border-radius:10px;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin-bottom:20px;
}

.new-chat:hover{
background:#00ff99;
}

.history-title{
margin:10px 0;
color:#aaa;
}

.history{
flex:1;
background:#222;
padding:10px;
border-radius:10px;
overflow:auto;
color:#aaa;
}

.menu{
margin-top:20px;
}

.menu a{
display:block;
padding:12px;
margin-bottom:10px;
background:#222;
border-radius:10px;
color:#fff;
text-decoration:none;
}

.menu a:hover{
background:#333;
}

.main{
flex:1;
display:flex;
flex-direction:column;
background:#343541;
}

.topbar{
height:65px;
background:#202123;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 20px;
border-bottom:1px solid #444;
}

.messages{
flex:1;
overflow-y:auto;
padding:20px;
}

.ai-message,
.user-message{
margin-bottom:15px;
display:flex;
}

.avatar{
font-size:28px;
margin-right:10px;
}

.bubble{
background:#444654;
padding:14px;
border-radius:12px;
max-width:80%;
line-height:1.6;
}

.user-message{
justify-content:flex-end;
}

.user-message .bubble{
background:#19c2ff;
color:#000;
}

.input-area{
display:flex;
padding:15px;
background:#202123;
gap:10px;
}

.input-area input{
flex:1;
padding:15px;
border:none;
border-radius:10px;
background:#40414f;
color:#fff;
font-size:16px;
outline:none;
}

.send-btn,
.voice-btn,
.listen-btn{
width:55px;
height:55px;
border:none;
border-radius:10px;
background:#19c2ff;
cursor:pointer;
font-size:20px;
}

.send-btn:hover,
.voice-btn:hover,
.listen-btn:hover{
background:#00ff99;
}

@media(max-width:768px){

.sidebar{
display:none;
}

.main{
width:100%;
}

}

</style>

</head>
<body>

<div class="app">

<!-- Sidebar -->
<div class="sidebar">

<div class="logo">🤖 AI Boss</div>

<button class="new-chat" onclick="newChat()">
➕ New Chat
</button>

<div class="history-title">
History
</div>

<div id="history" class="history">
No previous chats
</div>

<div class="menu">

<a href="index.html">🏠 Home</a>

<a href="image.html">🖼️ AI Image</a>

<a href="video.html">🎥 AI Video</a>

<a href="voice.html">🎤 AI Voice</a>

<a href="profile.html">👤 Profile</a>

<a href="settings.html">⚙️ Settings</a>

</div>

</div>

<!-- Main -->

<div class="main">

<div class="topbar">

<h2>🤖 AI Boss</h2>

<div style="color:#00ff99;">
🟢 Online
</div>

</div>

<div id="messages" class="messages">

<div class="ai-message">

<div class="avatar">🤖</div>

<div class="bubble">
Hello! I'm <b>AI Boss</b>.<br>
How can I help you today?
</div>

</div>

</div>

<div class="input-area">

<input
id="text"
type="text"
placeholder="Message AI Boss..."
onkeydown="if(event.key==='Enter') send();">

<button class="send-btn" onclick="send()">
➤
</button>

<button class="voice-btn" onclick="startVoice()">
🎤
</button>

<button class="listen-btn" onclick="speakReply()">
🔊
</button>

</div>

</div>

</div>
<script>

let lastReply = "";

const messages = document.getElementById("messages");

function addMessage(text,type){

const div=document.createElement("div");

div.className=type+"-message";

if(type==="ai"){

div.innerHTML=`
<div class="avatar">🤖</div>
<div class="bubble">${text}</div>
`;

}else{

div.innerHTML=`
<div class="bubble">${text}</div>
`;

}

messages.appendChild(div);

messages.scrollTop=messages.scrollHeight;

}

async function send(){

const input=document.getElementById("text");

const text=input.value.trim();

if(text==="") return;

addMessage(text,"user");

input.value="";

addMessage("⏳ AI Boss is typing...","ai");

try{

const language=localStorage.getItem("AI_Boss_Language") || "English";

const response=await fetch("/api/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

message:text,

language:language

})

});

const data=await response.json();

messages.removeChild(messages.lastElementChild);

lastReply=data.reply || "No response";

addMessage(lastReply,"ai");

localStorage.setItem(
"AI_Boss_Chat",
messages.innerHTML
);

document.getElementById("history").innerHTML="✅ Previous Chat Saved";

}catch{

messages.removeChild(messages.lastElementChild);

addMessage("❌ Server Error","ai");

}

}

function newChat(){

messages.innerHTML=`
<div class="ai-message">
<div class="avatar">🤖</div>
<div class="bubble">
Hello! I'm <b>AI Boss</b>.<br>
How can I help you today?
</div>
</div>
`;

localStorage.removeItem("AI_Boss_Chat");

document.getElementById("history").innerHTML="No previous chats";

}

function startVoice(){

const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;

if(!SpeechRecognition){

alert("Voice not supported");

return;

}

const recognition=new SpeechRecognition();

recognition.lang="en-US";

recognition.start();

recognition.onresult=function(e){

document.getElementById("text").value=e.results[0][0].transcript;

};

}

function speakReply(){

if(lastReply===""){

alert("No AI reply");

return;

}

const speech=new SpeechSynthesisUtterance(lastReply);

speech.lang="en-US";

window.speechSynthesis.speak(speech);

}

window.onload=function(){

const old=localStorage.getItem("AI_Boss_Chat");

if(old){

messages.innerHTML=old;

document.getElementById("history").innerHTML="✅ Previous Chat Saved";

}

};

</script>

</body>

</html>
