<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signup - AI Boss</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">
<a href="index.html">🏠 Home</a>
<a href="chat.html">💬 Chat</a>
<a href="image.html">🖼️ Image</a>
<a href="video.html">🎥 Video</a>
<a href="voice.html">🎙️ Voice</a>
</nav>

<div class="container">
<div class="card">

<h2>📝 Create Account</h2>

<input type="text" id="name" placeholder="Full Name"
style="width:100%;padding:12px;margin:10px 0;border-radius:8px;border:1px solid #333;">

<input type="email" id="email" placeholder="Email"
style="width:100%;padding:12px;margin:10px 0;border-radius:8px;border:1px solid #333;">

<input type="password" id="password" placeholder="Password"
style="width:100%;padding:12px;margin:10px 0;border-radius:8px;border:1px solid #333;">

<input type="password" id="confirm" placeholder="Confirm Password"
style="width:100%;padding:12px;margin:10px 0;border-radius:8px;border:1px solid #333;">

<button onclick="signup()"
style="width:100%;padding:12px;background:#00d4ff;color:black;border:none;border-radius:8px;font-weight:bold;cursor:pointer;">
Create Account
</button>

<p id="msg" style="margin-top:15px;"></p>

<p style="margin-top:15px;">
Already have an account?
<a href="login.html">Login</a>
</p>

</div>
</div>

<script>
function signup(){

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let password=document.getElementById("password").value;
let confirm=document.getElementById("confirm").value;

if(name==="" || email==="" || password==="" || confirm===""){
document.getElementById("msg").innerHTML="⚠️ Please fill all fields.";
return;
}

if(password!==confirm){
document.getElementById("msg").innerHTML="❌ Passwords do not match.";
return;
}

document.getElementById("msg").innerHTML="✅ Account created successfully (Demo Mode).";

}
</script>

</body>
</html
