<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings - AI Boss</title>

<style>
body{
    margin:0;
    background:#0b0b0b;
    color:white;
    font-family:Arial,sans-serif;
    text-align:center;
    transition:0.3s;
}

.card{
    background:#1a1a1a;
    width:90%;
    max-width:400px;
    margin:40px auto;
    padding:20px;
    border-radius:15px;
    transition:0.3s;
}

h1{
    margin-bottom:20px;
}

button,.btn{
    width:100%;
    padding:15px;
    margin:12px 0;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}

button{
    background:#007bff;
    color:white;
}

.btn{
    display:block;
    background:#00ff99;
    color:black;
    text-decoration:none;
    font-weight:bold;
    box-sizing:border-box;
}
</style>
</head>

<body>

<div class="card" id="card">

<h1>⚙️ Settings</h1>

<button onclick="toggleTheme()">🌙 Dark / Light Mode</button>

<button onclick="alert('Notifications feature will be added soon.')">
